<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Procurement Oscars — Host</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden;}
.screen.active{display:flex;}
.logo{position:absolute;top:24px;left:32px;display:flex;align-items:center;gap:10px;}
.logo-lyft{color:#FF00BF;font-weight:700;font-size:22px;}
.logo-sep{color:#444;font-size:22px;}
.logo-title{color:#888;font-size:16px;}
.counter-badge{position:absolute;top:24px;right:32px;background:#111;border:1px solid #222;border-radius:10px;padding:8px 16px;font-size:14px;color:#888;}
.counter-badge span{color:#FF00BF;font-weight:700;font-size:18px;margin-left:6px;}
h1{font-size:52px;font-weight:700;letter-spacing:-1px;margin-bottom:12px;}
h2{font-size:32px;font-weight:700;line-height:1.2;margin-bottom:0;}
.sub{color:#888;font-size:20px;margin-bottom:40px;}
.btn{background:#FF00BF;color:#fff;border:none;border-radius:14px;padding:16px 48px;font-size:18px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-ghost{background:transparent;border:1px solid #333;color:#666;border-radius:10px;padding:8px 20px;font-size:13px;cursor:pointer;margin-top:16px;}
.qr-wrap{background:#fff;border-radius:20px;padding:20px;display:inline-block;margin-bottom:28px;}
.award-num{color:#555;font-size:14px;margin-bottom:24px;}
.award-icon{font-size:56px;margin-bottom:16px;}
.timer-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;margin:32px 0 12px;}
.timer-ring{position:absolute;width:110px;height:110px;border-radius:50%;border:3px solid #FF00BF;opacity:0;transition:opacity .3s;}
.timer-ring.pulse{animation:pulseRing 1s ease-out infinite;}
.timer-circle{width:110px;height:110px;border-radius:50%;background:#1a1a2e;border:4px solid #333;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:700;transition:background .3s,border-color .3s;}
.timer-circle.hot{background:#FF00BF;border-color:#FF00BF;}
.votes-live{color:#555;font-size:15px;}
.votes-live span{color:#FF00BF;font-weight:700;}
.bar-row{margin-bottom:12px;}
.bar-label{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;}
.bar-label .name{color:#ccc;}
.bar-label .name.winner{color:#FF00BF;font-weight:700;}
.bar-label .cnt{color:#555;}
.bar-bg{height:12px;background:#1a1a1a;border-radius:6px;}
.bar-fill{height:12px;border-radius:6px;width:0;transition:width .8s ease;}
.bar-fill.winner{background:#FF00BF;}
.bar-fill.other{background:#333;}
.winner-announce{margin:16px 0 28px;}
.winner-announce .eyebrow{color:#888;font-size:18px;margin-bottom:6px;}
.winner-announce .name{font-size:44px;font-weight:700;color:#FF00BF;}
.winner-announce .tally{color:#666;font-size:16px;margin-top:4px;}
.lb-row{display:flex;align-items:center;gap:16px;background:#111;border:1px solid #222;border-radius:14px;padding:14px 20px;margin-bottom:10px;width:100%;max-width:560px;}
.lb-row.top1{border-color:#FF00BF;background:#1a0a14;}
.lb-medal{font-size:24px;min-width:32px;}
.lb-name{flex:1;font-size:18px;}
.lb-row.top1 .lb-name{color:#FF00BF;font-weight:700;}
.lb-awards{color:#555;font-size:14px;}
.confetti-piece{position:absolute;border-radius:2px;animation:confettiFall 2.5s ease-in forwards;}
@keyframes pulseRing{0%{transform:scale(1);opacity:.8;}100%{transform:scale(1.7);opacity:0;}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(500px) rotate(720deg);opacity:0;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes pop{0%{transform:scale(.8);opacity:0;}70%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
.fade-up{animation:fadeUp .5s ease forwards;}
.pop{animation:pop .45s ease forwards;}
  .bobble-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;animation:bobbleIn .5s cubic-bezier(.34,1.56,.64,1) forwards;}
.bobble-head{width:72px;height:72px;border-radius:50%;border:3px solid #FF00BF;overflow:hidden;animation:bobbleWobble 2.5s ease-in-out infinite;transform-origin:bottom center;box-shadow:0 0 16px rgba(255,0,191,0.3);}
.bobble-head img{width:100%;height:100%;object-fit:cover;object-position:top;}
.bobble-name{font-size:11px;color:#888;text-align:center;max-width:72px;line-height:1.2;}
.bobble-placeholder{width:72px;height:72px;border-radius:50%;border:3px dashed #333;background:#111;display:flex;align-items:center;justify-content:center;font-size:22px;color:#444;}
@keyframes bobbleIn{0%{opacity:0;transform:scale(0) translateY(20px);}100%{opacity:1;transform:scale(1) translateY(0);}}
@keyframes bobbleWobble{0%,100%{transform:rotate(-3deg);}25%{transform:rotate(3deg);}50%{transform:rotate(-2deg);}75%{transform:rotate(2deg);}}
.tie-mode{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:8px;}
.tie-name{color:#FF00BF;font-size:36px;font-weight:700;animation:pop .45s ease forwards;}
.tie-vs{color:#444;font-size:20px;font-weight:400;margin:0 4px;}
@keyframes tieShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
</style>
</head>
<body>

<div class="screen active" id="s-lobby">
  <div class="logo"><span class="logo-lyft">Lyft</span><span class="logo-sep">|</span><span class="logo-title">Procurement Oscars</span></div>
  <div class="counter-badge">Players joined <span id="voter-count">0</span></div>
  <div class="fade-up" style="text-align:center;max-width:600px;">
    <div style="font-size:64px;margin-bottom:16px;">🏆</div>
    <h1>Procurement Oscars</h1>
    <p class="sub">Scan to join on your phone</p>
    <div class="qr-wrap"><img id="qr-img" src="" width="200" height="200" alt="QR code"></div>
    <p style="color:#333;font-size:13px;font-family:monospace;margin-bottom:16px;" id="vote-url"></p>
      <div id="bobble-grid" style="display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-bottom:24px;min-height:100px;"></div>
      <button class="btn" onclick="startQuestion(0)">Start the Oscars</button>
  </div>
</div>

<div class="screen" id="s-question">
  <div class="logo"><span class="logo-lyft">Lyft</span><span class="logo-sep">|</span><span class="logo-title">Procurement Oscars</span></div>
  <div class="counter-badge">Votes in <span id="q-vote-count">0</span></div>
  <div style="text-align:center;max-width:700px;width:100%;" class="fade-up">
    <div class="award-num" id="q-num"></div>
    <div class="award-icon" id="q-icon"></div>
    <h2 id="q-label"></h2>
    <div class="timer-wrap">
      <div class="timer-ring" id="timer-ring"></div>
      <div class="timer-circle" id="timer-circle">10</div>
    </div>
    <div class="votes-live">votes in: <span id="q-votes-in">0</span> / <span id="q-total-voters">0</span></div>
    <br>
    <button class="btn-ghost" onclick="showResults()">Skip timer</button>
  </div>
</div>

<div class="screen" id="s-results">
  <div class="logo"><span class="logo-lyft">Lyft</span><span class="logo-sep">|</span><span class="logo-title">Procurement Oscars</span></div>
  <div style="width:100%;max-width:660px;">
    <div style="text-align:center;margin-bottom:28px;" class="fade-up">
      <div style="font-size:32px;margin-bottom:6px;" id="r-icon"></div>
      <div style="color:#666;font-size:16px;margin-bottom:16px;" id="r-label"></div>
      <div class="winner-announce pop" id="r-winner-block">
        <div class="eyebrow">and the Oscar goes to...</div>
        <div class="name" id="r-winner-name"></div>
        <div class="tally" id="r-winner-tally"></div>
      </div>
    </div>
    <div id="r-bars" style="margin-bottom:32px;"></div>
    <div style="text-align:center;">
      <button class="btn" id="btn-next-award" onclick="nextAward()">Next award →</button>
    </div>
  </div>
  <div id="confetti-container" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
</div>

<div class="screen" id="s-leaderboard">
  <div class="logo"><span class="logo-lyft">Lyft</span><span class="logo-sep">|</span><span class="logo-title">Procurement Oscars</span></div>
  <div class="fade-up" style="text-align:center;max-width:560px;width:100%;">
    <div style="font-size:52px;margin-bottom:8px;">🏆</div>
    <h2 style="margin-bottom:4px;">Hall of fame</h2>
    <p style="color:#666;font-size:15px;margin-bottom:28px;">Tonight's procurement legends</p>
    <div id="lb-rows"></div>
    <button class="btn-ghost" style="margin-top:20px;" onclick="resetGame()">Play again</button>
  </div>
  <div id="confetti-container2" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsLcoMxybDL7ZKy6ga_hUyg5g-GhIdulc",
  authDomain: "procurement-oscars.firebaseapp.com",
  databaseURL: "https://procurement-oscars-default-rtdb.firebaseio.com",
  projectId: "procurement-oscars",
  appId: "1:895558124316:web:4802ddc9aa01598eac70d9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const SUPERLATIVES = [
  {icon:"🧾",label:"Most likely to negotiate a restaurant bill"},
  {icon:"🕵️",label:"Best poker face in a vendor meeting"},
  {icon:"📋",label:"Would create a RACI chart for a birthday party"},
  {icon:"💻",label:"Most tabs open at once"},
  {icon:"📨",label:"Sends 'just circling back' the fastest after no reply"},
  {icon:"🤝",label:"Most likely to be on a first-name basis with every supplier"},
  {icon:"🌙",label:"Would reconcile invoices for fun on a Friday night"},
  {icon:"💬",label:"The one everyone Slacks before sending anything externally"},
  {icon:"📱",label:"Most likely to have a supplier's personal cell number"},
  {icon:"🗂️",label:"Most likely to remember a PO number from 3 years ago"},
];

let timerInterval = null;
let currentIdx = 0;
let allVotes = {};
let voterCount = 0;

const voteUrl = "https://pbansal-onsite.github.io/procurement-oscars/vote.html";
document.getElementById("vote-url").textContent = voteUrl;
document.getElementById("qr-img").src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(voteUrl)}`;

set(ref(db,"gameState"), {phase:"lobby", questionIdx:0});
remove(ref(db,"voters"));
remove(ref(db,"voterNames"));
remove(ref(db,"votes"));

const AVATARS = {
  "Angel Lin": "angel.jpg",
  "Ashley Wood": "ashley.jpg",
  "Bradlee Dabu": "bradlee.png",
  "Daniel Pappas": "daniel.png",
  "Dimitri Smith": "dimitri.png",
  "Grace Nasr": "grace.jpg",
  "Melissa Trager": "melissa.png",
  "Pooja Bansal": "pooja.jpg",
  "Rachel Goldstein": "rachel.jpg",
  "Raj Parikh": "raj.jpg",
  "Rebecca Kim": "rebecca.jpg",
  "Robert Lofthouse": "robert.jpg",
  "Shradha Muktidoot": "shradha.jpg",
  "William Morris": "william.jpg",
  "Jan": null,
  "Neha Kininge": null,
};

const BASE = "https://pbansal-onsite.github.io/procurement-oscars/";

onValue(ref(db,"voters"), snap => {
  const voterIds = snap.exists() ? Object.keys(snap.val()) : [];
  voterCount = voterIds.length;
  document.getElementById("voter-count").textContent = voterCount;
  document.getElementById("q-total-voters").textContent = voterCount;
});

onValue(ref(db,"voterNames"), snap => {
  const grid = document.getElementById("bobble-grid");
  if (!grid) return;
  const joined = snap.exists() ? Object.values(snap.val()) : [];
  grid.innerHTML = "";
  joined.forEach((name, i) => {
    const file = AVATARS[name];
    const wrap = document.createElement("div");
    wrap.className = "bobble-wrap";
    wrap.style.animationDelay = `${i * 0.08}s`;
    const head = document.createElement("div");
    head.className = "bobble-head";
    head.style.animationDelay = `${(i * 0.3) % 2}s`;
    if (file) {
      head.innerHTML = `<img src="${BASE}${file}" alt="${name}" onerror="this.parentElement.innerHTML='${name.split(' ').map(p=>p[0]).join('')}'">`;
    } else {
      head.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a2e;color:#FF00BF;font-weight:700;font-size:20px;">${name.split(' ').map(p=>p[0]).join('')}</div>`;
    }
    const label = document.createElement("div");
    label.className = "bobble-name";
    label.textContent = name.split(' ')[0];
    wrap.appendChild(head);
    wrap.appendChild(label);
    grid.appendChild(wrap);
  });
});

onValue(ref(db,"votes"), snap => {
  allVotes = snap.exists() ? snap.val() : {};
  if (document.getElementById("s-question").classList.contains("active")) {
    const v = allVotes[currentIdx] || {};
    const total = Object.values(v).reduce((a,b)=>a+b,0);
    document.getElementById("q-votes-in").textContent = total;
    document.getElementById("q-vote-count").textContent = total;
  }
});

window.startQuestion = function(idx) {
  currentIdx = idx;
  clearInterval(timerInterval);
  const s = SUPERLATIVES[idx];
  showScreen("s-question");
  document.getElementById("q-num").textContent = `Award ${idx+1} of ${SUPERLATIVES.length}`;
  document.getElementById("q-icon").textContent = s.icon;
  document.getElementById("q-label").textContent = s.label;
  document.getElementById("q-votes-in").textContent = "0";
  set(ref(db,"gameState"), {phase:"question", questionIdx:idx});
  let t = 10;
  const circle = document.getElementById("timer-circle");
  const ring = document.getElementById("timer-ring");
  circle.textContent = t;
  circle.classList.remove("hot");
  ring.classList.remove("pulse");
  timerInterval = setInterval(() => {
    t--;
    circle.textContent = t;
    if (t <= 3) { circle.classList.add("hot"); ring.classList.add("pulse"); }
    if (t <= 0) { clearInterval(timerInterval); window.showResults(); }
  }, 1000);
};

window.showResults = function() {
  clearInterval(timerInterval);
  const v = allVotes[currentIdx] || {};
  const entries = Object.entries(v).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,e)=>s+e[1],0);
  const s = SUPERLATIVES[currentIdx];
  showScreen("s-results");
  set(ref(db,"gameState"), {phase:"results", questionIdx:currentIdx});
  document.getElementById("r-icon").textContent = s.icon;
  document.getElementById("r-label").textContent = s.label;
  const topVotes = entries[0] ? entries[0][1] : 0;
  const tied = entries.filter(e => e[1] === topVotes);
  const isTie = tied.length > 1;

  const tiePhrases = [
    { eyebrow: "Nobody wins. Everybody loses. 🤝", sub: "The committee is shook." },
    { eyebrow: "It's a procurement standoff. 🔫", sub: "Both sides refuse to renegotiate." },
    { eyebrow: "This has never happened in Oscar history.", sub: "Legal is drafting a RACI chart for this situation." },
    { eyebrow: "A tie?! Who approved this?!", sub: "Someone's getting a 'just circling back' about this." },
    { eyebrow: "The spreadsheet has spoken... nothing.", sub: "Both names have been escalated to VP level." },
    { eyebrow: "Statistically improbable. Emotionally devastating.", sub: "The vendor is very confused." },
    { eyebrow: "Plot twist. Nobody saw this coming.", sub: "Except the person with 47 tabs open." },
  ];
  const phrase = tiePhrases[Math.floor(Math.random() * tiePhrases.length)];

  if (isTie) {
    document.getElementById("r-winner-name").innerHTML = tied.map(e => `<span class="tie-name">${e[0]}</span>`).join('<span class="tie-vs">vs</span>');
    document.getElementById("r-winner-name").classList.add("tie-mode");
    document.getElementById("r-winner-block").querySelector(".eyebrow").textContent = phrase.eyebrow;
    document.getElementById("r-winner-tally").textContent = `${topVotes} vote${topVotes!==1?"s":""} each · ${phrase.sub}`;
  } else {
    document.getElementById("r-winner-name").textContent = entries[0] ? entries[0][0] : "No votes";
    document.getElementById("r-winner-name").classList.remove("tie-mode");
    document.getElementById("r-winner-block").querySelector(".eyebrow").textContent = "and the Oscar goes to...";
    document.getElementById("r-winner-tally").textContent = `${topVotes} of ${total} vote${total!==1?"s":""}`;
  }
  const barsEl = document.getElementById("r-bars");
  barsEl.innerHTML = "";
  entries.slice(0,6).forEach(([name,cnt],i) => {
    const pct = total > 0 ? Math.round((cnt/total)*100) : 0;
    const isW = i===0;
    const row = document.createElement("div");
    row.className = "bar-row fade-up";
    row.style.animationDelay = `${i*0.1}s`;
    row.innerHTML = `<div class="bar-label"><span class="name ${isW?"winner":""}">${isW?"🏆 ":""}${name}</span><span class="cnt">${cnt} vote${cnt!==1?"s":""} · ${pct}%</span></div><div class="bar-bg"><div class="bar-fill ${isW?"winner":"other"}" style="width:${pct}%"></div></div>`;
    barsEl.appendChild(row);
  });
  if (entries[0]) spawnConfetti("confetti-container");
  document.getElementById("btn-next-award").textContent = currentIdx < SUPERLATIVES.length-1 ? "Next award →" : "See leaderboard 🏆";
};

window.nextAward = function() {
  if (currentIdx < SUPERLATIVES.length-1) {
    window.startQuestion(currentIdx+1);
  } else {
    showScreen("s-leaderboard");
    set(ref(db,"gameState"), {phase:"leaderboard", questionIdx:currentIdx});
    renderLeaderboard();
    spawnConfetti("confetti-container2");
  }
};

function renderLeaderboard() {
  const tally = {};
  SUPERLATIVES.forEach((_,i) => {
    const v = allVotes[i] || {};
    const entries = Object.entries(v).sort((a,b)=>b[1]-a[1]);
    if (entries[0]) { const w = entries[0][0]; tally[w] = (tally[w]||0)+1; }
  });
  const sorted = Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  const medals = ["🥇","🥈","🥉"];
  const cont = document.getElementById("lb-rows");
  cont.innerHTML = "";
let rank = 0;
sorted.forEach(([name,cnt],i) => {
    if (i===0 || cnt < sorted[i-1][1]) rank = i;
    const medal = rank===0?"🥇":rank===1?"🥈":rank===2?"🥉":"";
    const isTop = rank===0;
    const row = document.createElement("div");
    row.className = `lb-row${isTop?" top1":""}`;
    row.innerHTML = `<span class="lb-medal">${medal}</span><span class="lb-name">${name}</span><span class="lb-awards">${cnt} award${cnt!==1?"s":""}</span>`;
    cont.appendChild(row);
  });
}

window.resetGame = function() {
  remove(ref(db,"votes"));
  remove(ref(db,"voters"));
  set(ref(db,"gameState"),{phase:"lobby",questionIdx:0});
  allVotes = {};
  showScreen("s-lobby");
};

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function spawnConfetti(containerId) {
  const c = document.getElementById(containerId);
  c.innerHTML = "";
  const colors = ["#FF00BF","#fff","#a855f7","#22d3ee","#f59e0b"];
  for (let i=0;i<40;i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    const size = 6+Math.random()*8;
    p.style.cssText = `left:${Math.random()*100}%;top:0;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*1.5}s;`;
    c.appendChild(p);
  }
}
</script>
</body>
</html>
